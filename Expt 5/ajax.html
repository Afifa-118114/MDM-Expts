<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: rgb(21, 21, 21);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgb(241, 238, 236);
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 280px;
      box-shadow: 0 0 12px rgb(237, 120, 4);
    }

    input {
      padding: 8px;
      width: 80%;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 16px;
      border: none;
      background: rgb(237, 120, 4);
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #fafafb;
      color:black;
    }

    #result {
      margin-top: 15px;
      font-size: 16px;
    }

  </style>
</head>

<body>

<div class="card">
  <h2>Weather</h2>

  <input type="text" id="city" placeholder="Enter city">
  <br>
  <button onclick="showWeather()">Check</button>

  <p id="result"></p>
</div>

<script>
function showWeather() {
  var city = document.getElementById("city").value;
  var apiKey = "3ee3721a11e5cccac3f0313d0b1a1c31";

  var url =
    "https://api.openweathermap.org/data/2.5/weather?q=" +
    city +
    "&appid=" +
    apiKey +
    "&units=metric";

  fetch(url)
    .then(response => response.json())
    .then(data => {
      document.getElementById("result").innerHTML =
        "Temp: " + data.main.temp + " °C<br>" +
        "Humidity: " + data.main.humidity + "%<br>" +
        "Condition: " + data.weather[0].main ;
    })
    .catch(() => {
      document.getElementById("result").innerHTML = "City not found";
    });
}
</script>

</body>
</html>
