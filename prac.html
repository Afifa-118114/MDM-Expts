<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <style>
table, th, td {
  border: 1px solid black;
  border-collapse: collapse;
  padding: 8px;
}
</style>

<table>
  <tr>
    <th colspan="3">Student Details</th>
  </tr>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>City</th>
  </tr>
  <tr>
    <td>John</td>
    <td>20</td>
    <td>London</td>
  </tr>
</table>

<br>

<br>

<table>
  <tr>
    <th>Teacher</th>
    <th>Subjects</th>
  </tr>
  <tr>
    <td rowspan="3">Mr. Smith</td>
    <td>Math</td>
  </tr>
  <tr>
    <td>Science</td>
  </tr>
  <tr>
    <td>English</td>
  </tr>
</table>

<br>

<table>
  <tr>
    <th rowspan="2">Name</th>
    <th colspan="2">Marks</th>
  </tr>
  <tr>
    <th>Math</th>
    <th>Science</th>
  </tr>
  <tr>
    <td>John</td>
    <td>90</td>
    <td>85</td>
  </tr>
  <tr>
    <td>Mary</td>
    <td>88</td>
    <td>92</td>
  </tr>
</table>

</body>
</html>
